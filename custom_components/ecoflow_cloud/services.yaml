recover_wifi_via_ble:
  name: Recover Wi-Fi via BLE
  description: Trigger EcoFlow BLE Wi-Fi recovery for a supported device.
  fields:
    serial_number:
      name: Serial number
      description: EcoFlow serial number to recover.
      example: R62XXXXXXXXXXX
      selector:
        text:
    device_id:
      name: Device
      description: Home Assistant device ID for the EcoFlow device.
      selector:
        device:
          integration: ecoflow_cloud
    ssid:
      name: SSID
      description: Optional one-shot Wi-Fi SSID override for this recovery attempt.
      selector:
        text:
    password:
      name: Password
      description: Optional one-shot Wi-Fi password override for this recovery attempt.
      selector:
        text:
          type: password
    bssid:
      name: BSSID
      description: Optional one-shot BSSID override, formatted like AA:BB:CC:DD:EE:FF.
      selector:
        text:
    channel:
      name: Wi-Fi channel
      description: Optional one-shot Wi-Fi channel override, usually needed only on dual-band SSIDs.
      selector:
        number:
          min: 0
          max: 196
          mode: box

disable_auto_follow_current_wifi_via_ble:
  name: Disable Current Wi-Fi Follow via BLE
  description: Disable the remembered auto-follow Wi-Fi entry that is currently connected on a supported EcoFlow device.
  fields:
    serial_number:
      name: Serial number
      description: EcoFlow serial number to reset.
      example: R62XXXXXXXXXXX
      selector:
        text:
    device_id:
      name: Device
      description: Home Assistant device ID for the EcoFlow device.
      selector:
        device:
          integration: ecoflow_cloud
    reboot_after_disable:
      name: Reboot after disable
      description: Reboot the device via BLE after disabling the remembered Wi-Fi follow entry so the change applies immediately.
      selector:
        boolean:
    forget_current_wifi:
      name: Forget current Wi-Fi
      description: Delete the remembered Wi-Fi entry for the current SSID via BLE before rebooting, to force a fresh provisioning cycle.
      selector:
        boolean:
